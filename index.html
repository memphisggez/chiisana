<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChiiSAnA ♡ 花 | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* โทนสีจากสไตล์ ChiiSANa */
            --bg-soft: #fdf6ff; 
            --main-pink: #ffdae9;
            --dark-accent: #332d2d; /* สีดำนุ่มนวลสำหรับเมนู */
            --text-color: #5d5151;
            --white-glass: rgba(255, 255, 255, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }

        body {
            /* พื้นหลังไล่เฉดชมพู-ขาวนวล */
            background: linear-gradient(180deg, #fff5f8 0%, #f4eaff 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding-bottom: 100px;
            color: var(--text-color);
        }

        .container { width: 100%; max-width: 450px; padding: 25px; }

        /* ส่วนโปรไฟล์สไตล์ใหม่ */
        .profile-section {
            text-align: center;
            margin-bottom: 35px;
            padding-top: 20px;
        }

        .profile-img {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 8px 20px rgba(255, 182, 193, 0.4);
            margin-bottom: 15px;
            object-fit: cover;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 500;
            color: #ff85b3; /* สีชมพูหวาน */
            margin-bottom: 5px;
        }

        .profile-desc {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-color);
            background: var(--white-glass);
            padding: 15px;
            border-radius: 20px;
            margin: 10px 0;
            border: 1px dashed #ffc0cb;
        }

        /* ปุ่มบริการแบบโค้ด ChiiSANa (แคปซูล) */
        .btn-link {
            display: block;
            background: white;
            border: 2px solid var(--dark-accent);
            color: var(--dark-accent);
            text-decoration: none;
            padding: 15px;
            border-radius: 50px; /* ทรงแคปซูล */
            margin-bottom: 12px;
            text-align: center;
            font-weight: 500;
            transition: 0.3s;
            font-size: 15px;
        }

        .btn-link:hover {
            background: var(--main-pink);
            transform: scale(1.02);
        }

        /* ปุ่มเน้นสีดำแบบต้นฉบับ */
        .btn-dark {
            background: var(--dark-accent);
            color: white;
        }

        /* Bottom Nav สไตล์ ChiiSANa */
        .bottom-nav {
            position: fixed; bottom: 20px;
            width: 90%; max-width: 400px;
            background: var(--dark-accent);
            display: flex; justify-content: space-around;
            padding: 10px 5px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .nav-item { 
            text-decoration: none; 
            color: white; 
            font-size: 10px; 
            text-align: center;
            opacity: 0.8;
        }

        .nav-item.active { opacity: 1; color: #ffdae9; }
        .nav-item i { 
            font-size: 18px; 
            display: block; 
            margin-bottom: 2px;
            color: #ffdae9; /* สีหัวใจชมพู */
        }

    </style>
</head>
<body>

            ♡ ยินดีต้อนรับสู่ร้านของเค้าค่า ♡<br>

        </div>
    </div>

</div>

</html>
