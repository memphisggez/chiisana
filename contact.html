<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChiiSAnA ♡ Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-pink: #ffdae9;
            --soft-purple: #f4eaff;
            --text-main: #5d5151;
            --accent-pink: #ff85b3;
            --dark-menu: #332d2d;
            --glass: rgba(255, 255, 255, 0.7); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }

        body {
    /* 1. เปลี่ยนสีพื้นหลังเป็น #FFEEF9 */
    background-color: #FFEEF9; 
    
    /* ลายจุด (ใช้สีเทาอ่อนเพื่อให้ดูละมุนเข้ากับสีชมพู) */
    background-image: 
        radial-gradient(#d3d3d3 1px, transparent 1px), 
        radial-gradient(#d3d3d3 1px, transparent 1px); 
    
    background-size: 20px 20px; 
    background-position: 0 0, 10px 10px; 

    background-attachment: fixed; 
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding-bottom: 110px; 
    color: var(--text-main);
    position: relative;
    overflow-x: hidden;
}
        .container { 
            width: 100%; 
            max-width: 480px; 
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* --- Header Section --- */
        .contact-header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .contact-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 8px 20px rgba(255, 182, 193, 0.4);
            margin-bottom: 15px;
            object-fit: cover;
        }

        .contact-title {
            font-size: 26px;
            color: var(--accent-pink);
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 133, 179, 0.3);
        }

        /* --- Contact Card Style (ส่วนที่ซ่อมแซม) --- */
        .contact-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            color: var(--text-main);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 25px rgba(0,0,0,0.03);
        }

        .contact-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--accent-pink);
        }

        .contact-icon {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        .contact-info h3 {
            font-size: 18px;
            color: var(--accent-pink);
            margin-bottom: 2px;
        }

        .contact-info p {
            font-size: 13px;
            opacity: 0.7;
        }

        /* --- Nav & Animation (ปรับแก้ให้เท่า Index เป๊ะๆ) --- */
        .bottom-nav { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            max-width: 420px; 
            background: var(--dark-menu); 
            display: flex; 
            justify-content: space-around; 
            padding: 12px 5px; 
            border-radius: 20px; 
            z-index: 1000; 
        }

        .nav-item { 
            text-decoration: none; 
            color: white; 
            font-size: 10px; 
            text-align: center; 
            opacity: 0.7; 
            transition: 0.3s; 
            flex: 1; 
        }

        .nav-item.active { 
            opacity: 1; 
            color: var(--main-pink); 
        }

        .nav-item i { 
            font-size: 18px; 
            display: block; 
            margin-bottom: 3px; 
            color: var(--main-pink); 
            font-style: normal; 
        }

        .floating-sticker { position: fixed; bottom: 95px; right: 25px; width: 85px; z-index: 999; pointer-events: none; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15)); }
        .bg-chiikawa { position: fixed; pointer-events: none; z-index: 1; opacity: 0.25; animation: floatRandom linear infinite; }
    </style>
</head>
<body>

    <img src="จิบิจิ๋ว (27).png" alt="Chiikawa Sticker" class="floating-sticker">

    
<div class="container">
        <div class="contact-header">
            <img src="เย่.jpg" class="contact-avatar" alt="ChiiSAnA">
            <h1 class="contact-title">Contact Us</h1>
            <p style="font-size: 13px; opacity: 0.6;">ติดต่องานหรือสอบถามได้ที่ช่องทางด้านล่างเลยค่ะ ♡</p>
        </div>

        <a href="https://www.facebook.com/chiisana.xh" target="_blank" class="contact-card">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968764.png" class="contact-icon" alt="Facebook">
            <div class="contact-info">
                <h3>Facebook</h3>
                <p>คลิกเพื่อไปที่หน้าโปรไฟล์ Facebook</p>
            </div>
        </a>

        <a href="https://lin.ee/SriuzQD" target="_blank" class="contact-card">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968841.png" class="contact-icon" alt="Line">
            <div class="contact-info">
                <h3>Line Official</h3>
                <p>สอบถามส่วนตัว หรือสั่งงานผ่าน Line</p>
            </div>
        </a>

        <div style="text-align: center; margin-top: 40px;">
            <p style="font-size: 12px; opacity: 0.4;">(˶˃ᆺ˂˶) ขอบคุณที่ไว้วางใจร้านเรานะคะ</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i>♥</i>Home ♡</a>
        <a href="group.html" class="nav-item"><i>♥</i>เค้าดึงเมลเอง ♡</a>
        <a href="anothergroup.html" class="nav-item"><i>♥</i>กลุ่มอื่นๆ ♡</a>
        <a href="work.html" class="nav-item"><i>♥</i>สั่งป้าย ♡</a>
        <a href="contact.html" class="nav-item active"><i>♥</i>Contact ♡</a>
    </nav>

    <script>
        const numberOfBackgroundChiikawas = 10;
        const bgContainer = document.getElementById('bg-chiikawa-container');
        for (let i = 0; i < numberOfBackgroundChiikawas; i++) {
            const img = document.createElement('img');
            img.src = 'chiikawa 3.gif';
            img.classList.add('bg-chiikawa');
            const size = Math.random() * (70 - 40) + 40; 
            img.style.width = `${size}px`;
            img.style.left = `${Math.random() * 100}vw`;
            img.style.top = `${Math.random() * 100}vh`;
            const duration = Math.random() * (25 - 15) + 15;
            img.style.animationDuration = `${duration}s`;
            const animName = `float-contact-${i}`;
            const styleSheet = document.createElement("style");
            styleSheet.innerText = `@keyframes ${animName} {
                0% { transform: translate(0, 0) rotate(0deg); }
                50% { transform: translate(30px, 30px) rotate(20deg); }
                100% { transform: translate(0, 0) rotate(0deg); }
            }`;
            document.head.appendChild(styleSheet);
            img.style.animationName = animName;
            bgContainer.appendChild(img);
        }
    </script>
</body>
</html>
