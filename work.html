<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChiiSAnA ♡ Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-pink: #ffdae9;
            --soft-purple: #f4eaff;
            --text-main: #5d5151;
            --accent-pink: #ff85b3;
            --dark-menu: #332d2d;
            --glass: rgba(255, 255, 255, 0.7); 
            --glow-color: rgba(255, 133, 179, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }

        body {
            background: linear-gradient(135deg, #fff5f8 0%, #eae0f5 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding-bottom: 110px; 
            color: var(--text-main);
            position: relative;
            overflow-x: hidden;
        }

        .container { 
            width: 100%; 
            max-width: 480px; 
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* --- UI ส่วนหัว --- */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 0 5px;
        }
        
        .welcome-text p:first-child { font-size: 13px; opacity: 0.7; }
        .welcome-text p:last-child { font-size: 18px; font-weight: 500; color: var(--accent-pink); }

        .noti-btn {
            background: var(--glass);
            backdrop-filter: blur(5px);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            border: 1px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            font-size: 20px;
            cursor: pointer;
            overflow: hidden;
            transition: 0.2s;
        }
        .noti-btn:active { transform: scale(0.9); }

        /* --- Search Bar --- */
        .search-container {
            background: var(--glass);
            border-radius: 20px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 8px 20px rgba(255, 182, 193, 0.1);
        }
        .search-container input { border:none; background:none; outline:none; width:100%; font-size:14px; color: var(--text-main); }

        /* --- Promotion Card --- */
        .main-promo-card {
            background: linear-gradient(135deg, #ffdae9 0%, #f4eaff 100%);
            border-radius: 30px;
            padding: 25px;
            color: var(--text-main);
            position: relative;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid white;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.3);
        }
        .promo-content { position: relative; z-index: 2; }
        .promo-content h2 { font-size: 26px; color: var(--accent-pink); margin-bottom: 5px; }
        .promo-btn {
            margin-top: 15px;
            background: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 13px;
            color: var(--accent-pink);
            font-weight: 600;
            box-shadow: 0 5px 10px rgba(255,133,179,0.2);
            cursor: pointer;
        }
        .promo-img {
            position: absolute;
            right: -5px;
            bottom: -5px;
            width: 110px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        /* --- Stats Grid --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .stat-item {
            background: var(--glass);
            backdrop-filter: blur(5px);
            padding: 15px 5px;
            border-radius: 20px;
            text-align: center;
            font-size: 12px;
            border: 1px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }
        .stat-item b { color: var(--accent-pink); font-size: 16px; display: block; margin-bottom: 2px; }

        /* --- Recent List --- */
        .section-header {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }
        .section-header p { font-weight: 500; font-size: 16px; }
        .section-header a { font-size: 13px; color: var(--accent-pink); text-decoration: none; }

        .list-item {
            background: var(--glass);
            backdrop-filter: blur(5px);
            margin-bottom: 12px;
            padding: 12px 15px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.6);
            transition: 0.3s;
        }
        .list-thumb { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; border: 2px solid white; }
        .list-info p:first-child { font-size: 14px; font-weight: 500; }
        .list-info p:last-child { font-size: 11px; opacity: 0.5; }
        
        .badge-status {
            margin-left: auto;
            font-size: 10px;
            padding: 5px 10px;
            border-radius: 50px;
            font-weight: 500;
        }

        /* --- Bottom Nav --- */
        .bottom-nav { position: fixed; bottom: 20px; width: 90%; max-width: 420px; background: var(--dark-menu); display: flex; justify-content: space-around; padding: 12px 5px; border-radius: 20px; z-index: 1000; left: 50%; transform: translateX(-50%); }
        .nav-item { text-decoration: none; color: white; font-size: 10px; text-align: center; opacity: 0.7; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--main-pink); }
        .nav-item i { font-size: 18px; display: block; margin-bottom: 3px; color: var(--main-pink); font-style: normal; }
        
        /* --- BG Animation --- */
        .bg-chiikawa { position: fixed; pointer-events: none; z-index: 1; opacity: 0.2; }
    </style>
</head>
<body>

    <div id="bg-chiikawa-container"></div>

    <div class="container">
        <div class="top-header">
            <div class="welcome-text">
                <p>ยินดีต้อนรับ ♡</p>
                <p>ChiiSAnA Customer</p>
            </div>
            <div class="noti-btn" id="yamete-btn" onclick="playYamete()">
                <span id="noti-icon">🔔</span>
            </div>
        </div>

        <div class="search-container">
            <span>🔍</span>
            <input type="text" placeholder="ค้นหาบริการหรือกลุ่ม...">
        </div>

        <div class="main-promo-card">
            <div class="promo-content">
                <h2>Promotion!</h2>
                <p>สั่งป้ายวันนี้ ลดทันที 10% เลยน้า ♡</p>
                <button class="promo-btn">ดูรายละเอียด</button>
            </div>
            <img src="chiikawa 1.gif" class="promo-img" alt="sticker">
        </div>

        <div class="stats-grid">
            <div class="stat-item"><b>30+</b>กลุ่มงาน</div>
            <div class="stat-item"><b>230+</b>รีวิวลูกค้า</div>
            <div class="stat-item"><b>Fast</b>ส่งตามกำหนด</div>
        </div>

        <div class="section-header">
            <p>รายการล่าสุด (Auto Update)</p>
            <a href="#">ดูทั้งหมด</a>
        </div>

        <div id="sheet-data-container">
            <p style="text-align: center; font-size: 12px; opacity: 0.5; padding: 20px;">กำลังโหลดคิวงาน... (˶˃ᆺ˂˶)</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i>♥</i>Home ♡</a>
        <a href="group.html" class="nav-item"><i>♥</i>เค้าดึงเมลเอง ♡</a>
        <a href="anothergroup.html" class="nav-item"><i>♥</i>กลุ่มอื่นๆ ♡</a>
        <a href="work.html" class="nav-item active"><i>♥</i>สั่งป้าย ♡</a>
        <a href="contact.html" class="nav-item"><i>♥</i>Contact ♡</a>
    </nav>

    <script>
        /* 1. ระบบดึงข้อมูลจาก Google Sheet */
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTJxmzz6K0iG0J2FgxQQg9TAkRzyOm6RLEtfc9AIdT36GuoF5Y9jescVZr6fYGNOe3H8AB_EmTp8lD4/pub?output=csv';

        async function updateRecentWork() {
            try {
                const response = await fetch(SHEET_URL);
                const csvText = await response.text();
                const rows = csvText.split('\n').map(row => row.split(',')).slice(1);
                
                const container = document.getElementById('sheet-data-container');
                container.innerHTML = ''; 

                let count = 0;
                rows.forEach(col => {
                    if (col[1] && count < 5) {
                        const orderId = col[0] ? col[0].trim() : '-';
                        const jobName = col[1] ? col[1].trim() : '-';
                        const status = col[2] ? col[2].trim() : 'รอคิว';
                        
                        let statusColor = 'background: #f0f0f0; color: #888;';
                        if (status.includes('เสร็จ') || status.includes('สำเร็จ')) {
                            statusColor = 'background: #e7f9ee; color: #27ae60;';
                        } else if (status.includes('กำลัง') || status.includes('แก้')) {
                            statusColor = 'background: #fff5e6; color: #f39c12;';
                        }

                        const itemHTML = `
                            <div class="list-item">
                                <img src="ตัวอย่าง 1.jpg" class="list-thumb" onerror="this.src='https://via.placeholder.com/50?text=Chii'">
                                <div class="list-info">
                                    <p>${jobName}</p>
                                    <p>No: ${orderId}</p>
                                </div>
                                <span class="badge-status" style="${statusColor}">${status}</span>
                            </div>
                        `;
                        container.insertAdjacentHTML('beforeend', itemHTML);
                        count++;
                    }
                });
            } catch (e) {
                document.getElementById('sheet-data-container').innerHTML = '<p style="text-align:center; font-size:12px;">โหลดข้อมูลไม่สำเร็จ</p>';
            }
        }

        /* 2. ระบบปุ่ม Yamete */
        function playYamete() {
            const icon = document.getElementById('noti-icon');
            const audio = new Audio('yamete kudasai sound.mp3');
            audio.play();
            icon.innerHTML = `<img src="cat yamete.gif" style="width: 35px; height: 35px; object-fit: cover; border-radius: 8px;">`;
            audio.onended = () => { icon.innerHTML = "🔔"; };
        }

        /* 3. พื้นหลัง Chiikawa ลอยไปมา */
        const bgContainer = document.getElementById('bg-chiikawa-container');
        for (let i = 0; i < 12; i++) {
            const img = document.createElement('img');
            img.src = 'chiikawa 3.gif';
            img.classList.add('bg-chiikawa');
            const size = Math.random() * 40 + 40; 
            img.style.width = `${size}px`;
            img.style.left = `${Math.random() * 100}vw`;
            img.style.top = `${Math.random() * 100}vh`;
            
            const animName = `float-${i}`;
            const duration = Math.random() * 15 + 15;
            const style = document.createElement("style");
            style.innerText = `@keyframes ${animName} {
                0%, 100% { transform: translate(0, 0) rotate(0deg); }
                50% { transform: translate(${Math.random()*60}px, ${Math.random()*60}px) rotate(20deg); }
            }`;
            document.head.appendChild(style);
            img.style.animation = `${animName} ${duration}s linear infinite`;
            bgContainer.appendChild(img);
        }

        // เริ่มโหลดข้อมูล
        updateRecentWork();
    </script>
</body>
</html>
