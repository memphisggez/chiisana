<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChiiSAnA ♡ Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-pink: #ffdae9;
            --soft-purple: #f4eaff;
            --text-main: #5d5151;
            --accent-pink: #ff85b3;
            --dark-menu: #332d2d;
            --glass: rgba(255, 255, 255, 0.7); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }

        body {
            background: linear-gradient(135deg, #fff5f8 0%, #eae0f5 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding-bottom: 110px; 
            color: var(--text-main);
            position: relative;
            overflow-x: hidden;
        }

        .container { 
            width: 100%; 
            max-width: 480px; 
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* --- Header --- */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .welcome-text p:first-child { font-size: 13px; opacity: 0.7; }
        .welcome-text p:last-child { font-size: 18px; font-weight: 500; color: var(--accent-pink); }

        .noti-btn {
            background: var(--glass);
            backdrop-filter: blur(5px);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            border: 1px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            font-size: 20px;
            cursor: pointer;
        }

        /* --- Promo Card --- */
        .main-promo-card {
            background: linear-gradient(135deg, #ffdae9 0%, #f4eaff 100%);
            border-radius: 30px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid white;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.3);
        }
        .promo-content h2 { font-size: 26px; color: var(--accent-pink); margin-bottom: 5px; }
        .promo-btn {
            margin-top: 15px;
            background: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 13px;
            color: var(--accent-pink);
            font-weight: 600;
        }
        .promo-img { position: absolute; right: -5px; bottom: -5px; width: 110px; }

        /* --- Stats --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .stat-item {
            background: var(--glass);
            padding: 15px 5px;
            border-radius: 20px;
            text-align: center;
            font-size: 12px;
            border: 1px solid white;
        }
        .stat-item b { color: var(--accent-pink); font-size: 16px; display: block; }

        /* --- Section Header --- */
        .section-header {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 15px;
        }
        .section-header p { font-weight: 500; font-size: 16px; }
        .section-header a { 
            font-size: 12px; 
            color: var(--accent-pink); 
            text-decoration: none; 
            background: white;
            padding: 4px 12px;
            border-radius: 12px;
            border: 1px solid var(--main-pink);
        }

        /* --- List Items --- */
        .list-item {
            background: var(--glass);
            backdrop-filter: blur(5px);
            margin-bottom: 12px;
            padding: 12px 15px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.6);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .list-thumb { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; border: 2px solid white; }
        .list-info p:first-child { font-size: 14px; font-weight: 500; }
        .list-info p:last-child { font-size: 11px; opacity: 0.5; }
        
        .badge-status {
            margin-left: auto;
            font-size: 10px;
            padding: 5px 10px;
            border-radius: 50px;
            font-weight: 500;
        }

        /* --- Nav --- */
        .bottom-nav { position: fixed; bottom: 20px; width: 90%; max-width: 420px; background: var(--dark-menu); display: flex; justify-content: space-around; padding: 12px 5px; border-radius: 20px; z-index: 1000; left: 50%; transform: translateX(-50%); }
        .nav-item { text-decoration: none; color: white; font-size: 10px; text-align: center; opacity: 0.7; }
        .nav-item.active { opacity: 1; color: var(--main-pink); }
        .nav-item i { font-size: 18px; display: block; margin-bottom: 3px; color: var(--main-pink); font-style: normal; }

        .bg-chiikawa { position: fixed; pointer-events: none; z-index: 1; opacity: 0.2; }
    </style>
</head>
<body>

    <div id="bg-chiikawa-container"></div>

    <div class="container">
        <div class="top-header">
            <div class="welcome-text">
                <p>ยินดีต้อนรับ ♡</p>
                <p>ChiiSAnA Customer</p>
            </div>
            <div class="noti-btn" onclick="playYamete()">
                <span id="noti-icon">🔔</span>
            </div>
        </div>

        <div class="main-promo-card">
            <div class="promo-content">
                <h2>Promotion!</h2>
                <p>สั่งป้ายวันนี้ ลดทันที 10% เลยน้า ♡</p>
                <button class="promo-btn">ดูรายละเอียด</button>
            </div>
            <img src="chiikawa 1.gif" class="promo-img">
        </div>

        <div class="stats-grid">
            <div class="stat-item"><b>30+</b>กลุ่มงาน</div>
            <div class="stat-item"><b>230+</b>รีวิวลูกค้า</div>
            <div class="stat-item"><b>Fast</b>ส่งงานไว</div>
        </div>

        <div class="section-header">
            <p>รายการล่าสุด (Auto Update)</p>
            <a href="https://docs.google.com/spreadsheets/d/1JApKZ3mbzG4qEdyYD_CAhoOfNA3R7UD5PvgXo1_ko7I/edit?gid=1963409705#gid=1963409705" target="_blank">ดูทั้งหมด</a>
        </div>

        <div id="sheet-data-container">
            <p style="text-align: center; font-size: 12px; opacity: 0.5; padding: 20px;">กำลังโหลดคิวงาน... ♡</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item"><i>♥</i>Home</a>
        <a href="#" class="nav-item"><i>♥</i>เค้าดึงเมล</a>
        <a href="#" class="nav-item"><i>♥</i>กลุ่มอื่น</a>
        <a href="#" class="nav-item active"><i>♥</i>สั่งป้าย</a>
        <a href="#" class="nav-item"><i>♥</i>Contact</a>
    </nav>

        <script>
    // URL สำหรับดึงไฟล์ CSV จาก Google Sheets
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTJxmzz6K0iG0J2FgxQQg9TAkRzyOm6RLEtfc9AIdT36GuoF5Y9jescVZr6fYGNOe3H8AB_EmTp8lD4/pub?output=csv';

    async function updateRecentWork() {
        const container = document.getElementById('sheet-data-container');
        try {
            const response = await fetch(`${SHEET_CSV_URL}&t=${new Date().getTime()}`);
            if (!response.ok) throw new Error('Network response was not ok');
            
            const rawData = await response.text();
            
            // แยกแถวข้อมูล
            const rows = rawData.split(/\r?\n/).map(row => {
                return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            });

            container.innerHTML = ''; 
            let count = 0;

            // เริ่มวนลูปที่แถวที่ 7 (Index คือ 6)
            for (let i = 6; i < rows.length; i++) {
                const col = rows[i];
                
                // ตรวจสอบว่ามีคอลัมน์เพียงพอ (อย่างน้อยถึงคอลัมน์ M หรือ Index 12)
                if (!col || col.length < 13) continue;

                // ฟังก์ชันล้างเครื่องหมายคำพูดและช่องว่าง
                const clean = (val) => val ? val.replace(/^"|"$/g, '').trim() : '';

                // ดึงข้อมูลตามคอลัมน์ที่คุณระบุ
                const customer = clean(col[6]);  // คอลัมน์ G (Index 6)
                const status = clean(col[12]);  // คอลัมน์ M (Index 12)
                const qNumber = (i - 5);        // ลำดับคิว (คำนวณจากบรรทัด)

                // ถ้ามีชื่อลูกค้า ให้แสดงผล
                if (customer && customer !== "" && count < 8) {
                    let sStyle = 'background: #f0f0f0; color: #888;'; // สีเทา (Pending)
                    const lowStatus = status.toLowerCase();
                    
                    // กำหนดสีตามสถานะ (ปรับข้อความภาษาไทย/อังกฤษได้ที่นี่)
                    if (lowStatus.includes('สำเร็จ') || lowStatus.includes('เสร็จ') || lowStatus.includes('comp')) {
                        sStyle = 'background: #e7f9ee; color: #27ae60;'; // สีเขียว
                    } else if (lowStatus.includes('กำลัง') || lowStatus.includes('รอ') || lowStatus.includes('proc') || lowStatus.includes('draft')) {
                        sStyle = 'background: #fff5e6; color: #f39c12;'; // สีส้ม
                    }

                    container.innerHTML += `
                        <div class="list-item">
                            <img src="ตัวอย่าง 1.jpg" class="list-thumb" onerror="this.src='https://via.placeholder.com/50?text=Job'">
                            <div class="list-info">
                                <p>${customer}</p>
                                <p>Queue No: ${qNumber}</p>
                            </div>
                            <span class="badge-status" style="${sStyle}">${status || 'Pending'}</span>
                        </div>
                    `;
                    count++;
                }
            }

            // ถ้าวนลูปจนจบแล้วไม่เจอชื่อลูกค้าเลย
            if (count === 0) {
                container.innerHTML = '<p style="text-align:center; font-size:12px; opacity:0.5; padding:20px;">ไม่พบรายชื่อลูกค้าในแถวที่ 7 คอลัมน์ G ♡</p>';
            }

        } catch (error) {
            console.error('Error fetching data:', error);
            container.innerHTML = '<p style="text-align:center; font-size:12px; color:red; padding:20px;">เชื่อมต่อ Google Sheets ไม่สำเร็จ</p>';
        }
    }

    // ฟังก์ชันเล่นเสียงและเปลี่ยนไอคอน (คงเดิม)
    function playYamete() {
        const icon = document.getElementById('noti-icon');
        const audio = new Audio('yamete kudasai sound.mp3');
        audio.play().catch(() => {});
        icon.innerHTML = `<img src="cat yamete.gif" style="width:35px; border-radius:8px;">`;
        audio.onended = () => { icon.innerHTML = "🔔"; };
    }

    // ตกแต่งพื้นหลัง (คงเดิม)
    const bgContainer = document.getElementById('bg-chiikawa-container');
    for (let i = 0; i < 8; i++) {
        const img = document.createElement('img');
        img.src = 'chiikawa 3.gif';
        img.className = 'bg-chiikawa';
        img.style.width = '50px';
        img.style.left = Math.random() * 100 + 'vw';
        img.style.top = Math.random() * 100 + 'vh';
        bgContainer.appendChild(img);
    }

    window.onload = updateRecentWork;
</script>
</body>
</html>
